name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate PHP syntax
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Build plugin ZIP
        run: |
          set -euo pipefail

          plugin_slug="mbm-role-gated-products"
          build_dir="$RUNNER_TEMP/$plugin_slug"
          zip_path="$RUNNER_TEMP/$plugin_slug.zip"

          mkdir -p "$build_dir"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='*.zip' \
            --exclude='node_modules/' \
            ./ "$build_dir/"

          cd "$RUNNER_TEMP"
          zip -r "$zip_path" "$plugin_slug"

          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "$ZIP_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "MBM Role-Gated Products for WooCommerce $RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi
